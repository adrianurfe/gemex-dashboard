<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Gemex — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --red: #C8102E;
  --red-dark: #9B0D22;
  --red-light: #f5e6e9;
  --bg: #F4F3F0;
  --surface: #FFFFFF;
  --surface2: #FAFAF8;
  --border: #E2E0DA;
  --text: #1A1A1A;
  --text2: #6B6B6B;
  --text3: #A0A0A0;
  --green: #1A7A4A;
  --green-light: #E8F5EE;
  --amber: #C47A00;
  --amber-light: #FEF4E0;
  --blue: #1A5FA8;
  --blue-light: #E6EEFA;
  --sidebar-w: 220px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--text);
  display: flex; flex-direction: column;
  height: 100vh; flex-shrink: 0;
}
.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid #333;
}
.logo-box {
  background: var(--red);
  padding: 8px 12px;
  border-radius: 6px;
  display: inline-flex; align-items: center; gap: 8px;
}
.logo-text { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
.logo-icon { color: #fff; font-size: 18px; }

.sidebar-section { padding: 16px 12px 6px; }
.sidebar-label { color: #555; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 0 6px; margin-bottom: 4px; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px;
  color: #999; font-size: 13px; font-weight: 400;
  cursor: pointer; transition: all .15s; user-select: none;
  margin-bottom: 2px;
}
.nav-item:hover { background: #2a2a2a; color: #eee; }
.nav-item.active { background: var(--red); color: #fff; font-weight: 500; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

.sidebar-projects { flex: 1; overflow-y: auto; padding: 8px 12px; border-top: 1px solid #2a2a2a; }
.project-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px; border-radius: 6px; cursor: pointer;
  margin-bottom: 1px; transition: all .12s;
}
.project-item:hover { background: #2a2a2a; }
.project-item.active { background: #2a2a2a; }
.project-name { color: #ccc; font-size: 12px; }
.project-item.active .project-name { color: #fff; }
.project-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.sidebar-footer { padding: 12px; border-top: 1px solid #2a2a2a; }
.btn-add {
  width: 100%; padding: 8px; border-radius: 7px;
  border: 1px dashed #444; background: transparent;
  color: #666; font-size: 12px; font-family: var(--font);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .15s;
}
.btn-add:hover { border-color: var(--red); color: var(--red); background: rgba(200,16,46,.06); }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── TOPBAR ── */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 8px; }
.topbar-title { font-size: 15px; font-weight: 600; }
.topbar-sub { font-size: 12px; color: var(--text3); }
.tab-bar { display: flex; gap: 2px; }
.tab-btn {
  padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
  border: none; background: transparent; cursor: pointer; color: var(--text2);
  font-family: var(--font); display: flex; align-items: center; gap: 6px;
  transition: all .15s;
}
.tab-btn:hover { background: var(--bg); color: var(--text); }
.tab-btn.active { background: var(--red); color: #fff; }
.tab-btn svg { width: 14px; height: 14px; }

.topbar-actions { display: flex; align-items: center; gap: 8px; }
.period-select {
  background: var(--bg); border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 6px;
  font-size: 12px; font-family: var(--font); color: var(--text);
  cursor: pointer; outline: none;
}
.btn-save {
  background: var(--red); color: #fff;
  border: none; padding: 7px 14px; border-radius: 7px;
  font-size: 12px; font-weight: 500; font-family: var(--font);
  cursor: pointer; transition: background .15s;
}
.btn-save:hover { background: var(--red-dark); }

/* ── CONTENT PAGES ── */
.page { display: none; flex: 1; overflow: auto; }
.page.active { display: block; }

/* ── CAPTURE PAGE ── */
.capture-wrap { padding: 16px 20px; }
.project-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.project-title-row { display: flex; align-items: center; gap: 8px; }
.project-badge { width: 8px; height: 8px; border-radius: 50%; }
.project-title { font-size: 14px; font-weight: 600; }

.table-wrap { background: var(--surface); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px; }
.table-top {
  padding: 7px 12px; background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text2);
  display: flex; align-items: center; justify-content: space-between;
}

/* compact table */
.data-table { width: 100%; border-collapse: collapse; font-size: 11px; }

/* header rows */
.data-table tr.hrow-top th {
  background: #F2F1ED; color: var(--text2); font-weight: 600;
  padding: 5px 0; text-align: center;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  white-space: nowrap; font-size: 10px; letter-spacing: .3px;
}
.data-table tr.hrow-top th.cat-h { text-align: left; padding-left: 10px; min-width: 100px; background: #ECEAE4; }
.data-table tr.hrow-top th.q-h  { background: #E8E5DE; font-weight: 700; }
.data-table tr.hrow-top th.ann-h{ background: #E8E5DE; font-weight: 700; color: var(--red); }

.data-table tr.hrow-sub th {
  background: #F8F7F4; color: var(--text3);
  padding: 3px 0; text-align: center; font-size: 9px; font-weight: 500;
  border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
  letter-spacing: .4px; text-transform: uppercase;
}
.data-table tr.hrow-sub th.cat-h { background: #ECEAE4; }
.data-table tr.hrow-sub th.q-h  { background: #EEEbE3; }
.data-table tr.hrow-sub th.ann-h{ background: #EEEbE3; }

/* body rows */
.data-table tr.drow td {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 0; text-align: center; vertical-align: middle;
}
.data-table tr.drow:last-child td { border-bottom: none; }
.data-table tr.drow td.cat-cell {
  text-align: left; padding: 0 10px;
  background: var(--surface2); white-space: nowrap;
  font-size: 11px; font-weight: 600; color: var(--text); height: 44px;
  border-right: 2px solid var(--border);
}
.data-table tr.drow:nth-child(odd) td.cat-cell { background: #F5F4F0; }

/* paired inputs inside one cell */
.cell-pair {
  display: flex; flex-direction: column;
  height: 44px;
}
.cell-pair input {
  flex: 1; width: 100%; border: none; outline: none;
  text-align: center; font-family: var(--mono); font-size: 11px;
  background: transparent; color: var(--text);
  transition: background .1s; padding: 0 4px;
}
.cell-pair input.inp-proy { border-bottom: 1px solid var(--border); color: var(--blue); }
.cell-pair input.inp-real  { color: var(--green); }
.cell-pair input:focus { background: #FFFBF0; }
.cell-pair input.currency { font-size: 10px; }

/* quarter / annual computed cells */
.cell-q { background: #F5F3EE !important; }
.cell-ann { background: #F0EDE6 !important; }
.cell-pair input.inp-proy-ro { color: rgba(26,95,168,.5); font-size: 10px; border-bottom: 1px solid var(--border); }
.cell-pair input.inp-real-ro  { color: rgba(26,122,74,.6); font-size: 10px; }

/* progress mini bar inside annual cell */
.ann-cell-inner { display: flex; flex-direction: column; height: 44px; align-items: stretch; }
.ann-cell-inner input { flex:1; width:100%; border:none; outline:none; text-align:center; font-family:var(--mono); font-size:10px; background:transparent; padding:0 4px; }
.ann-cell-inner input.inp-proy-ro { color:rgba(26,95,168,.5); border-bottom:1px solid var(--border); }
.ann-cell-inner input.inp-real-ro { color:rgba(26,122,74,.7); font-weight:600; }
.ann-bar-wrap { height:3px; background:var(--border); margin: 0 6px 2px; border-radius:2px; overflow:hidden; }
.ann-bar { height:100%; border-radius:2px; transition: width .3s; }

/* ── DASHBOARD PAGE ── */
.dash-wrap { padding: 20px 24px; }
.period-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
.period-tab {
  padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; transition: all .15s; color: var(--text2);
}
.period-tab.active { background: var(--red); color: #fff; border-color: var(--red); }

.dash-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  margin-bottom: 20px;
}
.chart-card {
  background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
  padding: 18px; display: flex; flex-direction: column; align-items: center;
}
.chart-card-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; text-align: center; }
.chart-card-sub { font-size: 11px; color: var(--text3); margin-bottom: 12px; text-align: center; }
.chart-wrap { position: relative; width: 150px; height: 150px; }
.chart-center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; pointer-events: none;
}
.chart-pct { font-size: 22px; font-weight: 600; line-height: 1; }
.chart-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

.chart-legend { display: flex; flex-direction: column; gap: 5px; width: 100%; margin-top: 12px; }
.legend-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
.legend-dot { display: flex; align-items: center; gap: 5px; color: var(--text2); }
.legend-dot::before { content: ''; width: 8px; height: 8px; border-radius: 2px; }
.legend-val { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text); }

.cobranza-card {
  background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
  padding: 20px; grid-column: span 3;
}
.cob-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cob-title { font-size: 14px; font-weight: 600; }
.cob-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.cob-item { background: var(--surface2); border-radius: 8px; padding: 12px 14px; }
.cob-period { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
.cob-amounts { display: flex; flex-direction: column; gap: 4px; }
.cob-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
.cob-row-label { color: var(--text2); }
.cob-row-val { font-family: var(--mono); font-weight: 500; }
.cob-bar-wrap { margin-top: 8px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.cob-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>

<script>
// ─── DATA MODEL ───────────────────────────────────────────────
const COLORS = ['#C8102E','#1A5FA8','#1A7A4A','#C47A00','#7B2D8B','#006B8F','#D4570A','#2D6A4F'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const QUARTERS = { '1q':[0,1,2],'2q':[3,4,5],'3q':[6,7,8],'4q':[9,10,11] };
const CATS = ['inicios','ventas','terminaciones','escrituracion','post_venta'];
const CAT_LABELS = { inicios:'Inicios', ventas:'Ventas', terminaciones:'Terminaciones', escrituracion:'Escrituración', post_venta:'Post venta', cobranza:'Cobranza' };

let projects = [
  { id:1, name:'Arrayenes', color:COLORS[0] },
  { id:2, name:'Los Prados', color:COLORS[1] },
];
let selectedProject = 1;
let currentPeriod = 'mes';

// data[projectId][cat][month] = {proy, real}
let data = {};

function initProject(id) {
  if (data[id]) return;
  data[id] = {};
  CATS.forEach(c => {
    data[id][c] = MONTHS.map(()=>({proy:'',real:''}));
  });
  data[id].cobranza = MONTHS.map(()=>({proy:'',real:''}));
}
projects.forEach(p=>initProject(p.id));

// Seed Arrayenes with sample data
function seed() {
  const d = data[1];
  const sampleProy = { inicios:[3,3,3,0,0,0,0,0,0,0,0,0], ventas:[5,5,5,0,0,0,0,0,0,0,0,0], terminaciones:[0,0,3,0,0,0,0,0,0,0,0,0], escrituracion:[0,0,0,3,0,0,0,0,0,0,0,0], post_venta:[0,0,0,3,0,0,0,0,0,0,0,0] };
  const sampleReal = { inicios:[2,2,4,0,0,0,0,0,0,0,0,0], ventas:[6,3,4,0,0,0,0,0,0,0,0,0], terminaciones:[0,0,2,0,0,0,0,0,0,0,0,0], escrituracion:[0,0,0,2,0,0,0,0,0,0,0,0], post_venta:[0,0,0,2,0,0,0,0,0,0,0,0] };
  CATS.forEach(c=>{
    MONTHS.forEach((_,i)=>{ d[c][i].proy = sampleProy[c][i]||''; d[c][i].real = sampleReal[c][i]||''; });
  });
  const cobranzaProy = [0,0,0,0,6000000,0,0,0,0,0,0,0];
  const cobranzaReal = [0,0,0,0,4000000,0,0,0,0,0,0,0];
  MONTHS.forEach((_,i)=>{ d.cobranza[i].proy=cobranzaProy[i]||''; d.cobranza[i].real=cobranzaReal[i]||''; });
}
seed();

// ─── SIDEBAR ──────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('projectList');
  list.innerHTML = projects.map(p=>`
    <div class="project-item ${p.id===selectedProject?'active':''}" onclick="selectProject(${p.id})">
      <span class="project-name">${p.name}</span>
      <span class="project-dot" style="background:${p.color}"></span>
    </div>`).join('');
}

function selectProject(id) {
  selectedProject = id;
  renderSidebar();
  renderCapture();
  refreshDash();
}

function addProject() {
  const name = prompt('Nombre del proyecto:');
  if (!name) return;
  const id = Date.now();
  const color = COLORS[projects.length % COLORS.length];
  projects.push({id,name,color});
  initProject(id);
  selectProject(id);
}

// ─── TABS / VIEWS ─────────────────────────────────────────────
function switchTab(tab) {
  ['dashboard','capture'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('page-'+t).classList.toggle('active',t===tab);
  });
  if (tab==='capture') renderCapture();
  if (tab==='dashboard') refreshDash();
}
function switchView(v) {
  document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active',i===(v==='dashboard'?0:1)));
  switchTab(v);
}

// ─── CAPTURE TABLE ────────────────────────────────────────────
function renderCapture() {
  const proj = projects.find(p=>p.id===selectedProject);
  if (!proj) return;
  const wrap = document.getElementById('captureWrap');
  const d = data[selectedProject];
  const allCats = [...CATS, 'cobranza'];

  // Build header row 1: category + month groups + quarter cols + annual
  // Row 1: month names spanning 2 sub-cols each (proy/real), quarter spans 2, annual spans 2
  let hTop = `<th class="cat-h" rowspan="2">Indicador</th>`;
  MONTHS.forEach((m, i) => {
    const label = m.charAt(0).toUpperCase() + m.slice(1, 3);
    hTop += `<th colspan="2">${label}</th>`;
    if ((i+1)%3===0) hTop += `<th class="q-h" colspan="2">${['1Q','2Q','3Q','4Q'][Math.floor(i/3)]}</th>`;
  });
  hTop += `<th class="ann-h" colspan="2">Anual</th>`;

  // Row 2: P / R sub-headers for each month, Q, Annual
  let hSub = `<th class="cat-h"></th>`;
  MONTHS.forEach((m, i) => {
    hSub += `<th>P</th><th>R</th>`;
    if ((i+1)%3===0) hSub += `<th class="q-h">P</th><th class="q-h">R</th>`;
  });
  hSub += `<th class="ann-h">P</th><th class="ann-h">R</th>`;

  // Data rows — one per category
  let rows = '';
  allCats.forEach(cat => {
    const isCob = cat === 'cobranza';
    let qProy=[0,0,0,0], qReal=[0,0,0,0], annProy=0, annReal=0;

    let cells = '';
    MONTHS.forEach((m, i) => {
      const pv = d[cat][i].proy; const rv = d[cat][i].real;
      const pn = parseFloat(pv)||0; const rn = parseFloat(rv)||0;
      const q = Math.floor(i/3);
      qProy[q]+=pn; qReal[q]+=rn; annProy+=pn; annReal+=rn;
      const cls = isCob ? 'currency' : '';
      cells += `<td>
        <div class="cell-pair">
          <input class="inp-proy ${cls}" data-cat="${cat}" data-month="${i}" data-type="proy" value="${pv}" onchange="updateCell(this)" placeholder="">
          <input class="inp-real ${cls}" data-cat="${cat}" data-month="${i}" data-type="real" value="${rv}" onchange="updateCell(this)" placeholder="">
        </div>
      </td><td></td>`;
    });
    // fix: replace the blank second td per month with real, restructure
    // Actually rebuild properly:
    cells = '';
    MONTHS.forEach((m, i) => {
      const pv = d[cat][i].proy; const rv = d[cat][i].real;
      const cls = isCob ? 'currency' : '';
      cells += `
        <td><input class="inp-proy ${cls}" style="display:block;width:100%;border:none;outline:none;text-align:center;font-family:var(--mono);font-size:11px;background:transparent;color:var(--blue);padding:2px 3px;height:44px;transition:background .1s;" data-cat="${cat}" data-month="${i}" data-type="proy" value="${pv}" onchange="updateCell(this)" placeholder="" onfocus="this.style.background='#FFFBF0'" onblur="this.style.background='transparent'"></td>
        <td><input class="inp-real ${cls}" style="display:block;width:100%;border:none;outline:none;text-align:center;font-family:var(--mono);font-size:11px;background:transparent;color:var(--green);padding:2px 3px;height:44px;transition:background .1s;" data-cat="${cat}" data-month="${i}" data-type="real" value="${rv}" onchange="updateCell(this)" placeholder="" onfocus="this.style.background='#FFFBF0'" onblur="this.style.background='transparent'"></td>`;
      if ((i+1)%3===0) {
        const qi = Math.floor(i/3);
        const qp = isCob?fmtMoney(qProy[qi]):qProy[qi]||'';
        const qr = isCob?fmtMoney(qReal[qi]):qReal[qi]||'';
        cells += `
          <td class="cell-q" style="background:#F5F3EE;"><input readonly value="${qp}" style="display:block;width:100%;border:none;outline:none;text-align:center;font-family:var(--mono);font-size:10px;background:transparent;color:rgba(26,95,168,.6);padding:2px 3px;height:44px;"></td>
          <td class="cell-q" style="background:#F5F3EE;"><input readonly value="${qr}" style="display:block;width:100%;border:none;outline:none;text-align:center;font-family:var(--mono);font-size:10px;background:transparent;color:rgba(26,122,74,.7);padding:2px 3px;height:44px;font-weight:600;"></td>`;
      }
    });
    const ap = isCob?fmtMoney(annProy):annProy||'';
    const ar = isCob?fmtMoney(annReal):annReal||'';
    const pct = annProy>0?Math.round((annReal/annProy)*100):0;
    const barColor = pct>=100?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
    cells += `
      <td class="cell-ann" style="background:#EDEAE2;">
        <div class="ann-cell-inner">
          <input readonly value="${ap}" style="flex:1;width:100%;border:none;outline:none;text-align:center;font-family:var(--mono);font-size:10px;background:transparent;color:rgba(26,95,168,.5);padding:0 3px;border-bottom:1px solid var(--border);">
          <input readonly value="${ar}" style="flex:1;width:100%;border:none;outline:none;text-align:center;font-family:var(--mono);font-size:10px;background:transparent;color:${barColor};padding:0 3px;font-weight:700;">
          <div class="ann-bar-wrap"><div class="ann-bar" style="width:${Math.min(pct,100)}%;background:${barColor};"></div></div>
        </div>
      </td>
      <td class="cell-ann" style="background:#EDEAE2;text-align:center;vertical-align:middle;font-size:10px;font-weight:700;color:${barColor};">${pct}%</td>`;

    rows += `<tr class="drow"><td class="cat-cell">${CAT_LABELS[cat]}</td>${cells}</tr>`;
  });

  wrap.innerHTML = `
    <div class="project-header">
      <div class="project-title-row">
        <div class="project-badge" style="background:${proj.color}"></div>
        <span class="project-title">${proj.name}</span>
      </div>
      <span style="font-size:10px;color:var(--text3)"><span style="display:inline-block;width:8px;height:8px;background:var(--blue);border-radius:1px;margin-right:4px;vertical-align:middle;"></span>P = Proyección &nbsp;<span style="display:inline-block;width:8px;height:8px;background:var(--green);border-radius:1px;margin-right:4px;vertical-align:middle;"></span>R = Real</span>
    </div>
    <div class="table-wrap">
      <div class="table-top">
        <span>Indicadores 2025</span>
        <span style="font-size:10px;color:var(--text3)">Clic para editar · Barra = % cumplimiento anual</span>
      </div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr class="hrow-top">${hTop}</tr>
            <tr class="hrow-sub">${hSub}</tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function updateCell(el) {
  const cat = el.dataset.cat;
  const month = parseInt(el.dataset.month);
  const type = el.dataset.type;
  data[selectedProject][cat][month][type] = el.value;
  renderCapture();
  refreshDash();
}

function fmtMoney(n) {
  if (!n) return '';
  return '$'+Number(n).toLocaleString('es-MX');
}

// ─── DASHBOARD ────────────────────────────────────────────────
let chartInstances = {};

function setPeriod(p, el) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  refreshDash();
}

function getPeriodData(cat, projectId, period) {
  const d = data[projectId][cat];
  let months = [];
  if (period==='mes') months = [new Date().getMonth()];
  else if (period==='anual') months = [...Array(12).keys()];
  else months = QUARTERS[period] || [];
  let proy=0, real=0;
  months.forEach(i=>{ proy+=parseFloat(d[i].proy)||0; real+=parseFloat(d[i].real)||0; });
  return {proy,real};
}

function refreshDash() {
  const grid = document.getElementById('dashGrid');
  // destroy old charts
  Object.values(chartInstances).forEach(c=>c.destroy());
  chartInstances = {};

  const allCats = [...CATS,'cobranza'];
  let html = '';
  allCats.forEach(cat=>{
    const isCob = cat==='cobranza';
    let rows = '';
    // aggregate across all projects
    let totalProy=0, totalReal=0;
    projects.forEach(p=>{
      const {proy,real} = getPeriodData(cat, p.id, currentPeriod);
      totalProy += proy; totalReal += real;
    });
    const pct = totalProy>0 ? Math.round((totalReal/totalProy)*100) : 0;
    const pctColor = pct>=100?'var(--green)':pct>=70?'var(--amber)':'var(--red)';

    // per project rows
    projects.forEach((p,i)=>{
      const {proy,real} = getPeriodData(cat, p.id, currentPeriod);
      const ppct = proy>0?Math.round((real/proy)*100):0;
      rows += `<div class="legend-row">
        <div class="legend-dot" style="gap:6px">
          <div style="width:8px;height:8px;border-radius:2px;background:${p.color};flex-shrink:0"></div>
          <span>${p.name}</span>
        </div>
        <span class="legend-val">${isCob?fmtMoney(real)||'$0':real||0} / ${isCob?fmtMoney(proy)||'$0':proy||0}</span>
      </div>`;
    });

    const canvasId = 'chart-'+cat;
    html += `<div class="chart-card">
      <div class="chart-card-title">${CAT_LABELS[cat]}</div>
      <div class="chart-card-sub">${getPeriodLabel()}</div>
      <div class="chart-wrap">
        <canvas id="${canvasId}" width="150" height="150"></canvas>
        <div class="chart-center">
          <span class="chart-pct" style="color:${pctColor}">${pct}%</span>
          <span class="chart-lbl">cumplimiento</span>
        </div>
      </div>
      <div class="chart-legend">${rows}</div>
    </div>`;
  });

  // Cobranza summary card (wider)
  grid.innerHTML = html;

  // render charts
  allCats.forEach(cat=>{
    const canvas = document.getElementById('chart-'+cat);
    if (!canvas) return;
    // per project data
    const projData = projects.map(p=>getPeriodData(cat, p.id, currentPeriod));
    const proyVals = projData.map(v=>v.proy||0.001);
    const realVals = projData.map(v=>v.real||0);
    const total = proyVals.reduce((a,b)=>a+b,0);
    // show real vs remaining
    const totalReal = realVals.reduce((a,b)=>a+b,0);
    const totalProy = proyVals.reduce((a,b)=>a+b,0);
    const remaining = Math.max(0, totalProy - totalReal);

    chartInstances[cat] = new Chart(canvas, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [...realVals.map(v=>Math.max(v,0)), remaining > 0 ? remaining : 0.001],
          backgroundColor: [...projects.map(p=>p.color), '#E8E6E0'],
          borderWidth: 2,
          borderColor: '#fff',
          hoverOffset: 4,
        }]
      },
      options: {
        cutout: '70%',
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        animation: { duration: 400 },
        responsive: false,
      }
    });
  });
}

function getPeriodLabel() {
  const labels = { mes:'Mes actual', '1q':'1er Trimestre', '2q':'2do Trimestre', '3q':'3er Trimestre', '4q':'4to Trimestre', anual:'Meta anual' };
  return labels[currentPeriod]||'';
}

function saveData() {
  try {
    localStorage.setItem('gemex_data', JSON.stringify(data));
    localStorage.setItem('gemex_projects', JSON.stringify(projects));
    const btn = document.querySelector('.btn-save');
    const orig = btn.textContent;
    btn.textContent = '✓ Guardado';
    btn.style.background = 'var(--green)';
    setTimeout(()=>{ btn.textContent=orig; btn.style.background=''; }, 1800);
  } catch(e) {}
}

function loadSaved() {
  try {
    const d = localStorage.getItem('gemex_data');
    const p = localStorage.getItem('gemex_projects');
    if (d) data = JSON.parse(d);
    if (p) { projects = JSON.parse(p); projects.forEach(pr=>initProject(pr.id)); }
  } catch(e) {}
}

// ─── INIT ─────────────────────────────────────────────────────
loadSaved();
renderSidebar();
refreshDash();
</script>
</body>
</html>
